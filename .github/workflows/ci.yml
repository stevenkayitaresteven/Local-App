name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API · build, typecheck, test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./prisma/ci.db"
      JWT_ACCESS_SECRET: ci-access-secret-ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret-ci-refresh-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build shared package
        run: npm run build -w @umuturanyi/shared
      - name: Generate Prisma client
        run: npm run prisma:generate -w @umuturanyi/api
      - name: Typecheck
        run: |
          npm run typecheck -w @umuturanyi/shared
          npm run typecheck -w @umuturanyi/api
      - name: Test (shared)
        run: npm run test -w @umuturanyi/shared
      - name: Test (api integration)
        run: npm run test -w @umuturanyi/api
      - name: Build API
        run: npm run build -w @umuturanyi/api

  mobile:
    name: Mobile · typecheck & bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build shared package
        run: npm run build -w @umuturanyi/shared
      - name: Typecheck mobile
        run: npm run typecheck -w @umuturanyi/mobile
      - name: Bundle (Metro export, android)
        run: npx expo export --platform android --output-dir ./dist-export
        working-directory: apps/mobile

  docker:
    name: API · docker image builds
    runs-on: ubuntu-latest
    needs: api
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f apps/api/Dockerfile -t umuturanyi-api:ci .
